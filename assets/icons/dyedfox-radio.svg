<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">

  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="#3B0764"/>

  <!-- Fox ears (drawn before head so head covers the bases naturally) -->
  <!-- Left ear outer -->
  <polygon points="13,52 27,4 45,43" fill="#6D28D9"/>
  <!-- Left ear inner highlight -->
  <polygon points="19,48 27,13 40,41" fill="#EDE9FE"/>

  <!-- Right ear outer -->
  <polygon points="55,43 73,4 87,52" fill="#6D28D9"/>
  <!-- Right ear inner highlight -->
  <polygon points="60,41 73,13 81,48" fill="#EDE9FE"/>

  <!-- Headphone band (under the head, over the ears) -->
  <path d="M 14 58 Q 50 4 86 58"
        stroke="#1E1B4B" stroke-width="6.5" fill="none" stroke-linecap="round"/>

  <!-- Fox face (covers the band's middle, lets ear tips show above) -->
  <circle cx="50" cy="63" r="33" fill="#8B5CF6"/>

  <!-- Headphone ear cups (on top of face edges) -->
  <!-- Left cup outer -->
  <circle cx="14" cy="63" r="11" fill="#1E1B4B"/>
  <!-- Left cup inner -->
  <circle cx="14" cy="63" r="7"  fill="#4C1D95"/>

  <!-- Right cup outer -->
  <circle cx="86" cy="63" r="11" fill="#1E1B4B"/>
  <!-- Right cup inner -->
  <circle cx="86" cy="63" r="7"  fill="#4C1D95"/>

  <!-- Eyes -->
  <circle cx="39" cy="60" r="4.5" fill="white"/>
  <circle cx="61" cy="60" r="4.5" fill="white"/>
  <!-- Pupils -->
  <circle cx="40" cy="59" r="2.5" fill="#1E1B4B"/>
  <circle cx="62" cy="59" r="2.5" fill="#1E1B4B"/>
  <!-- Eye shine -->
  <circle cx="41" cy="57.5" r="1" fill="white"/>
  <circle cx="63" cy="57.5" r="1" fill="white"/>

  <!-- Nose -->
  <ellipse cx="50" cy="70" rx="3.5" ry="2.5" fill="#2E1065"/>
  <!-- Nose shine -->
  <circle cx="48.5" cy="69" r="1" fill="#A78BFA"/>

  <!-- Subtle mouth -->
  <path d="M 47 73 Q 50 76 53 73" stroke="#4C1D95" stroke-width="1.5" fill="none" stroke-linecap="round"/>

</svg>
